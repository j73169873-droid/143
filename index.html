<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RUST BUILDER - Выживание со стройкой домов</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1e3a2f 0%, #0e2a1c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Segoe UI', monospace;
            touch-action: manipulation;
        }

        .game-container {
            background: #2b3b22;
            border-radius: 48px;
            padding: 18px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,200,0.2);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 10px 28px black;
            cursor: crosshair;
            background: #5c9c3e;
        }

        .stats-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 12px;
            margin-top: 16px;
            background: #1f2a18;
            padding: 10px 18px;
            border-radius: 60px;
        }

        .stat {
            background: #0f1f0c;
            padding: 4px 16px;
            border-radius: 32px;
            color: #ffecb3;
            font-weight: bold;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: inset 0 1px 3px #6f9e3a;
        }

        .resource-bar {
            background: #1f2c16cc;
            backdrop-filter: blur(6px);
            margin-top: 12px;
            padding: 10px 18px;
            border-radius: 48px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 12px;
        }

        .resources {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .res-item {
            background: #2c4622;
            padding: 4px 14px;
            border-radius: 32px;
            color: #f7e9b0;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.95rem;
        }

        .build-panel {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        button {
            background: #d99e42;
            border: none;
            font-family: monospace;
            font-weight: bold;
            font-size: 0.85rem;
            padding: 5px 14px;
            border-radius: 40px;
            color: #1f2a0a;
            cursor: pointer;
            transition: 0.07s linear;
            box-shadow: 0 3px 0 #7a481e;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #7a481e;
        }

        .build-mode {
            background: #4f7a2e;
            color: white;
            box-shadow: 0 0 0 2px #ffd966;
        }

        .action-log {
            background: #000000aa;
            color: #f3de8a;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: bold;
            backdrop-filter: blur(5px);
            text-align: center;
        }

        @media (max-width: 800px) {
            .stat { font-size: 0.85rem; padding: 3px 10px;}
            .res-item { font-size: 0.75rem; }
            button { font-size: 0.7rem; padding: 4px 10px; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="1100" height="620"></canvas>
        <div class="stats-panel">
            <div class="stat">❤️ Здоровье: <span id="hpVal">100</span></div>
            <div class="stat">🍗 Голод: <span id="hungerVal">80</span></div>
            <div class="stat">💧 Жажда: <span id="thirstVal">80</span></div>
            <div class="stat">🛡️ Броня: <span id="armorVal">0</span></div>
            <div class="stat">⚔️ Урон: <span id="dmgVal">12</span></div>
        </div>
        <div class="resource-bar">
            <div class="resources">
                <div class="res-item">🪵 Древесина: <span id="woodRes">20</span></div>
                <div class="res-item">🪨 Камень: <span id="stoneRes">10</span></div>
                <div class="res-item">🥩 Мясо: <span id="meatRes">5</span></div>
                <div class="res-item">🧵 Ткань: <span id="clothRes">4</span></div>
                <div class="res-item">💧 Вода: <span id="waterRes">6</span></div>
                <div class="res-item">🔩 Металл: <span id="metalRes">0</span></div>
            </div>
            <div class="build-panel">
                <button id="buildWallBtn">🪵 Стена (8 дер + 4 камня)</button>
                <button id="buildFloorBtn">⬛ Фундамент (12 дер + 6 камня)</button>
                <button id="buildRoofBtn">🔺 Крыша (10 дер + 3 камня)</button>
                <button id="toggleBuildBtn" style="background:#6c8c3a;">🔨 Режим стройки: ВЫКЛ</button>
            </div>
        </div>
        <div style="display: flex; justify-content: space-between; margin-top: 12px; gap: 12px;">
            <div class="action-log" id="infoMsg">🏠 Rust строитель: собирай ресурсы, строй базу, защищайся!</div>
            <div class="action-log">🖱️ ЛКМ по врагу/ресурсу | Режим стройки: клик по земле = постройка</div>
        </div>
        <div style="display: flex; gap: 12px; justify-content: center; margin-top: 10px;">
            <button id="eatBtn">🍖 Съесть мясо</button>
            <button id="drinkBtn">💧 Выпить воду</button>
            <button id="craftAxeBtn">🪓 Каменный топор (6 дер + 4 камня) +8 урона</button>
            <button id="craftArmorBtn">🛡️ Броня из шкур (12 ткани + 6 мяса) 30% защиты</button>
        </div>
    </div>
</div>

<script>
    (function(){
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // ----- ИГРОК -----
        let player = {
            x: 550, y: 500, radius: 18,
            health: 100, maxHealth: 100,
            hunger: 80, thirst: 80,
            armor: 0,
            baseDamage: 12,
            weaponBonus: 0
        };
        
        // Ресурсы
        let resources = {
            wood: 20, stone: 10, meat: 5, cloth: 4, water: 6, metal: 0
        };
        
        // Мир: ресурсы (деревья, камни, кусты, руда)
        let worldResources = [];
        // Враги
        let enemies = [];
        // ----- ПОСТРОЙКИ (домики) -----
        let buildings = [];  // каждый объект: {x, y, type, width, height, hp, maxHp}
        const BUILDING_TYPES = {
            WALL: { name: "Стена", color: "#aa8c54", icon: "🪵", width: 32, height: 32, hp: 80, costWood: 8, costStone: 4 },
            FLOOR: { name: "Фундамент", color: "#7a5a3a", icon: "⬜", width: 44, height: 44, hp: 120, costWood: 12, costStone: 6 },
            ROOF: { name: "Крыша", color: "#b57c48", icon: "🔺", width: 38, height: 28, hp: 70, costWood: 10, costStone: 3 }
        };
        
        // Режим строительства
        let buildModeActive = false;
        let selectedBuildType = "WALL"; // WALL, FLOOR, ROOF
        
        let gameRunning = true;
        let gameOver = false;
        
        // таймеры
        let lastHungerTime = 0;
        let lastSpawnResource = 0;
        let lastSpawnEnemy = 0;
        
        let infoMessage = "Добро пожаловать! Строй дом и выживай!";
        let msgTimeout = null;
        
        // вспомогательные UI
        function updateUI(){
            document.getElementById('hpVal').innerText = Math.floor(player.health);
            document.getElementById('hungerVal').innerText = Math.floor(player.hunger);
            document.getElementById('thirstVal').innerText = Math.floor(player.thirst);
            document.getElementById('armorVal').innerText = player.armor;
            let totalDmg = player.baseDamage + player.weaponBonus;
            document.getElementById('dmgVal').innerText = totalDmg;
            document.getElementById('woodRes').innerText = resources.wood;
            document.getElementById('stoneRes').innerText = resources.stone;
            document.getElementById('meatRes').innerText = resources.meat;
            document.getElementById('clothRes').innerText = resources.cloth;
            document.getElementById('waterRes').innerText = resources.water;
            document.getElementById('metalRes').innerText = resources.metal;
        }
        
        function setMessage(msg, isError=false){
            infoMessage = msg;
            const div = document.getElementById('infoMsg');
            div.innerText = msg;
            if(isError) div.style.background = "#9a3a2caa";
            else div.style.background = "#000000aa";
            if(msgTimeout) clearTimeout(msgTimeout);
            msgTimeout = setTimeout(()=>{
                document.getElementById('infoMsg').innerText = "🏗️ Режим стройки: кнопка вкл/выкл. Строй базу!";
                document.getElementById('infoMsg').style.background = "#000000aa";
            }, 3200);
        }
        
        function checkDeath(){
            if(!gameRunning) return;
            if(player.health <= 0){
                gameRunning = false;
                gameOver = true;
                setMessage("💀 ВЫ ПОГИБЛИ... Обновите страницу (F5)", true);
            }
            if(player.hunger <= 0 || player.thirst <= 0){
                player.health = Math.max(0, player.health - 4);
                if(player.hunger <=0) player.hunger=0;
                if(player.thirst <=0) player.thirst=0;
                updateUI();
                if(player.health <=0){
                    gameRunning=false;
                    gameOver=true;
                    setMessage("Смерть от истощения. Перезапустите игру", true);
                }
            }
        }
        
        // голод/жажда
        function hungerThirstDecay(){
            if(!gameRunning) return;
            player.hunger = Math.max(0, player.hunger - 4);
            player.thirst = Math.max(0, player.thirst - 5);
            if(player.hunger===0 || player.thirst===0){
                player.health = Math.max(0, player.health-6);
                setMessage("⚠️ Истощение! Здоровье падает!", true);
            }
            player.health = Math.min(player.maxHealth, player.health);
            updateUI();
            checkDeath();
        }
        
        function eatMeat(){
            if(!gameRunning) return;
            if(resources.meat>=1){
                resources.meat--;
                player.hunger = Math.min(100, player.hunger+35);
                player.health = Math.min(player.maxHealth, player.health+12);
                setMessage("🥩 Съели мясо! +35 голод, +12 здоровья");
                updateUI();
                checkDeath();
            } else setMessage("Нет мяса! Охоться на врагов", true);
        }
        
        function drinkWater(){
            if(!gameRunning) return;
            if(resources.water>=1){
                resources.water--;
                player.thirst = Math.min(100, player.thirst+40);
                player.health = Math.min(player.maxHealth, player.health+8);
                setMessage("💧 Вкусная вода! +40 жажда");
                updateUI();
                checkDeath();
            } else setMessage("Нет воды! Собирай бутылки или создай флягу", true);
        }
        
        // Крафты улучшений
        function craftStoneAxe(){
            if(resources.wood>=6 && resources.stone>=4){
                resources.wood-=6; resources.stone-=4;
                player.weaponBonus = 8;
                setMessage("⛏️ Каменный топор +8 к урону!");
                updateUI();
            } else setMessage("Нужно 6 дерева и 4 камня!", true);
        }
        
        function craftHideArmor(){
            if(resources.cloth>=12 && resources.meat>=6){
                resources.cloth-=12; resources.meat-=6;
                player.armor = 30;
                setMessage("🛡️ Кожаная броня готова! -30% урона.");
                updateUI();
            } else setMessage("Нужно 12 ткани и 6 мяса!", true);
        }
        
        // ----- ПОСТРОЙКИ -----
        function canAffordBuilding(typeKey){
            let cost = BUILDING_TYPES[typeKey];
            return (resources.wood >= cost.costWood && resources.stone >= cost.costStone);
        }
        
        function tryPlaceBuilding(x, y, typeKey){
            if(!gameRunning) return false;
            let typeData = BUILDING_TYPES[typeKey];
            if(!canAffordBuilding(typeKey)){
                setMessage(`Не хватает ресурсов: ${typeData.costWood} дерева, ${typeData.costStone} камня`, true);
                return false;
            }
            // проверка коллизии с другими постройками и игроком
            let buildingW = typeData.width;
            let buildingH = typeData.height;
            let newRect = { x: x - buildingW/2, y: y - buildingH/2, w: buildingW, h: buildingH };
            // столкновение с игроком
            if(Math.hypot(player.x - x, player.y - y) < player.radius + 15){
                setMessage("Слишком близко к вам!", true);
                return false;
            }
            for(let b of buildings){
                let bRect = { x: b.x - b.width/2, y: b.y - b.height/2, w: b.width, h: b.height };
                if(newRect.x < bRect.x + bRect.w && newRect.x + newRect.w > bRect.x &&
                   newRect.y < bRect.y + bRect.h && newRect.y + newRect.h > bRect.y){
                    setMessage("Нельзя строить на другой постройке!", true);
                    return false;
                }
            }
            // вычитаем ресурсы
            resources.wood -= typeData.costWood;
            resources.stone -= typeData.costStone;
            buildings.push({
                x: x, y: y, type: typeKey,
                width: typeData.width, height: typeData.height,
                hp: typeData.hp, maxHp: typeData.hp,
                icon: typeData.icon, color: typeData.color
            });
            setMessage(`Построено: ${typeData.name}!`);
            updateUI();
            return true;
        }
        
        // строительство по клику (в режиме стройки)
        function handleBuildClick(canvasX, canvasY){
            if(!buildModeActive) return false;
            tryPlaceBuilding(canvasX, canvasY, selectedBuildType);
            return true;
        }
        
        // ---- Генерация мира (ресурсы) ----
        const resourceTypes = [
            { name: "tree", icon: "🌲", color: "#447a32", action: ()=> { resources.wood += 5; setMessage("🪵 +5 древесины"); }, radius: 14 },
            { name: "rock", icon: "🪨", color: "#7c6b55", action: ()=> { resources.stone += 4; setMessage("🪨 +4 камня"); }, radius: 13 },
            { name: "bush", icon: "🌿", color: "#5f8b47", action: ()=> { resources.cloth += 2; setMessage("🧵 +2 ткани"); }, radius: 12 },
            { name: "metal", icon: "🔩", color: "#5e616b", action: ()=> { resources.metal += 2; setMessage("🔩 +2 металла"); }, radius: 12 }
        ];
        
        function spawnResource(){
            if(worldResources.length > 35) return;
            let rand = Math.random();
            let typeIdx = 0;
            if(rand<0.5) typeIdx=0;
            else if(rand<0.75) typeIdx=1;
            else if(rand<0.92) typeIdx=2;
            else typeIdx=3;
            let tpl = resourceTypes[typeIdx];
            let x = 40 + Math.random() * (canvas.width - 80);
            let y = 50 + Math.random() * (canvas.height - 130);
            // не на игроке
            if(Math.hypot(x-player.x, y-player.y) < 55){
                x = (x+70) % (canvas.width-60)+30;
                y = (y+50) % (canvas.height-80)+40;
            }
            worldResources.push({
                x, y, radius: tpl.radius, type: tpl.name, icon: tpl.icon, color: tpl.color, action: tpl.action
            });
        }
        
        // ---- Враги (дикари) ----
        function spawnEnemy(){
            if(enemies.length >= 6) return;
            let side = Math.floor(Math.random()*4);
            let x,y;
            if(side===0){ x=30; y=80+Math.random()*(canvas.height-160); }
            else if(side===1){ x=canvas.width-30; y=80+Math.random()*(canvas.height-160); }
            else if(side===2){ x=60+Math.random()*(canvas.width-120); y=40; }
            else{ x=60+Math.random()*(canvas.width-120); y=canvas.height-50; }
            if(Math.hypot(x-player.x, y-player.y)<90){
                x = (x+100)%(canvas.width-70)+35;
                y = (y+80)%(canvas.height-80)+40;
            }
            let hp = 55;
            let dmg = 16;
            enemies.push({ x, y, radius: 20, health: hp, maxHealth: hp, damage: dmg, icon: "🏹", name: "Дикарь", type:"enemy" });
        }
        
        function attackEnemy(idx, totalDamage){
            let e = enemies[idx];
            if(!e) return;
            e.health -= totalDamage;
            setMessage(`⚔️ Атака! Урон ${totalDamage} по ${e.name}.`);
            if(e.health <= 0){
                let meatDrop = 3 + Math.floor(Math.random()*3);
                let clothDrop = 2;
                resources.meat += meatDrop;
                resources.cloth += clothDrop;
                setMessage(`💀 Убит ${e.name}! +${meatDrop} мяса, +${clothDrop} ткани.`);
                enemies.splice(idx,1);
                updateUI();
            } else updateUI();
        }
        
        function enemiesAttack(){
            if(!gameRunning) return;
            for(let i=0;i<enemies.length;i++){
                let e = enemies[i];
                let dist = Math.hypot(player.x - e.x, player.y - e.y);
                if(dist < player.radius + e.radius + 10){
                    let rawDamage = e.damage;
                    let mitigated = Math.floor(rawDamage * (1 - player.armor/100));
                    let finalDmg = Math.max(2, mitigated);
                    player.health = Math.max(0, player.health - finalDmg);
                    setMessage(`😖 ${e.name} атакует! -${finalDmg} здоровья`, true);
                    updateUI();
                    checkDeath();
                    if(!gameRunning) break;
                    let angle = Math.atan2(player.y - e.y, player.x - e.x);
                    e.x -= Math.cos(angle)*18;
                    e.y -= Math.sin(angle)*18;
                    e.x = Math.min(canvas.width-20, Math.max(20, e.x));
                    e.y = Math.min(canvas.height-40, Math.max(40, e.y));
                }
            }
        }
        
        // сбор ресурсов
        function collectResource(idx){
            let r = worldResources[idx];
            if(r){
                r.action();
                worldResources.splice(idx,1);
                updateUI();
                checkDeath();
            }
        }
        
        // ---- Обработка кликов (атака/сбор/стройка) ----
        function handleCanvasClick(e){
            if(!gameRunning) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let cx, cy;
            if(e.touches){
                cx = (e.touches[0].clientX - rect.left)*scaleX;
                cy = (e.touches[0].clientY - rect.top)*scaleY;
                e.preventDefault();
            } else {
                cx = (e.clientX - rect.left)*scaleX;
                cy = (e.clientY - rect.top)*scaleY;
            }
            // Режим стройки имеет приоритет над сбором?
            if(buildModeActive){
                if(handleBuildClick(cx, cy)) return;
            }
            // атака врагов
            for(let i=0;i<enemies.length;i++){
                let en = enemies[i];
                if(Math.hypot(cx-en.x, cy-en.y) < en.radius+10){
                    let totalDmg = player.baseDamage + player.weaponBonus;
                    attackEnemy(i, totalDmg);
                    return;
                }
            }
            // сбор ресурсов
            for(let i=0;i<worldResources.length;i++){
                let res = worldResources[i];
                if(Math.hypot(cx-res.x, cy-res.y) < res.radius+10){
                    collectResource(i);
                    return;
                }
            }
            setMessage("Нет цели. Атакуй врагов или собирай деревья/камни.");
        }
        
        // движение игрока за мышью
        let targetX = player.x, targetY = player.y;
        function handleMouseMove(e){
            if(!gameRunning) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let mx, my;
            if(e.touches){
                mx = (e.touches[0].clientX - rect.left)*scaleX;
                my = (e.touches[0].clientY - rect.top)*scaleY;
                e.preventDefault();
            } else {
                mx = (e.clientX - rect.left)*scaleX;
                my = (e.clientY - rect.top)*scaleY;
            }
            targetX = Math.min(canvas.width-player.radius, Math.max(player.radius, mx));
            targetY = Math.min(canvas.height-player.radius, Math.max(player.radius, my));
        }
        
        function updateMovement(){
            if(!gameRunning) return;
            let dx = targetX - player.x, dy = targetY - player.y;
            let dist = Math.hypot(dx,dy);
            if(dist>1){
                let move = Math.min(5.2, dist);
                player.x += (dx/dist)*move;
                player.y += (dy/dist)*move;
                player.x = Math.min(canvas.width-player.radius, Math.max(player.radius, player.x));
                player.y = Math.min(canvas.height-player.radius, Math.max(player.radius, player.y));
            }
        }
        
        // ---- Отрисовка всего ----
        function draw(){
            ctx.clearRect(0,0,canvas.width,canvas.height);
            // земля
            ctx.fillStyle = "#7aa55a";
            ctx.fillRect(0,0,canvas.width,canvas.height);
            // трава
            for(let i=0;i<400;i++){
                ctx.fillStyle = `rgba(50,80,30,${Math.random()*0.25})`;
                ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 4,4);
            }
            // ресурсы
            for(let r of worldResources){
                ctx.beginPath();
                ctx.arc(r.x, r.y, r.radius, 0, Math.PI*2);
                ctx.fillStyle = r.color;
                ctx.fill();
                ctx.fillStyle = "#211c14";
                ctx.font = `${r.radius+6}px monospace`;
                ctx.fillText(r.icon, r.x-12, r.y+9);
            }
            // постройки
            for(let b of buildings){
                let w = b.width, h = b.height;
                let x = b.x - w/2, y = b.y - h/2;
                ctx.fillStyle = b.color;
                ctx.shadowBlur = 2;
                ctx.fillRect(x, y, w, h);
                ctx.strokeStyle = "#5e3a1e";
                ctx.lineWidth = 2;
                ctx.strokeRect(x, y, w, h);
                ctx.font = `${Math.min(w,h)-6}px monospace`;
                ctx.fillStyle = "#f9e2a1";
                ctx.fillText(b.icon, b.x-12, b.y+8);
                ctx.font = "10px monospace";
                ctx.fillStyle = "#fff0b5";
                ctx.fillText(`${b.hp}❤️`, b.x-12, b.y-12);
                if(b.type==="ROOF"){ ctx.fillStyle = "#ba8a4a"; ctx.fillRect(x+5, y-6, w-10, 6); }
            }
            // враги
            for(let e of enemies){
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2);
                ctx.fillStyle = "#a34d2c";
                ctx.fill();
                ctx.fillStyle = "#2e1c12";
                ctx.font = "26px monospace";
                ctx.fillText(e.icon, e.x-14, e.y+12);
                ctx.fillStyle = "#ffc285";
                ctx.font = "bold 12px monospace";
                ctx.fillText(`${e.health}❤️`, e.x-15, e.y-12);
            }
            // игрок
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2);
            ctx.fillStyle = "#d8b06e";
            ctx.fill();
            ctx.fillStyle = "#32281c";
            ctx.font = "28px monospace";
            ctx.fillText("🪓", player.x-14, player.y+12);
            ctx.fillStyle = "white";
            ctx.font = "bold 13px monospace";
            ctx.fillText(`${Math.floor(player.health)}❤️`, player.x-18, player.y-16);
            if(player.armor>0) ctx.fillText("🛡️", player.x+12, player.y-12);
            if(player.weaponBonus>0) ctx.fillText("⚡", player.x+8, player.y-18);
            ctx.shadowBlur = 0;
            // подсказка стройки
            if(buildModeActive){
                ctx.font = "bold 20px monospace";
                ctx.fillStyle = "#ffe8a3";
                ctx.shadowBlur = 4;
                ctx.fillText("🔨 РЕЖИМ СТРОЙКИ АКТИВЕН", canvas.width/2-140, 40);
                ctx.font = "14px monospace";
                ctx.fillStyle = "#d4ff7c";
                ctx.fillText(`Текущий блок: ${BUILDING_TYPES[selectedBuildType].name}`, canvas.width/2-120, 70);
            }
            if(gameOver){
                ctx.font = "bold 44px monospace";
                ctx.fillStyle = "#aa2a1a";
                ctx.fillText("GAME OVER", canvas.width/2-140, canvas.height/2-40);
            }
        }
        
        // ----- Инициализация интервалов и старт -----
        let hungerInterval, spawnResInt, spawnEnemyInt, enemyAttackInt;
        function startLoops(){
            if(hungerInterval) clearInterval(hungerInterval);
            if(spawnResInt) clearInterval(spawnResInt);
            if(spawnEnemyInt) clearInterval(spawnEnemyInt);
            if(enemyAttackInt) clearInterval(enemyAttackInt);
            hungerInterval = setInterval(()=>{ if(gameRunning) hungerThirstDecay(); }, 5500);
            spawnResInt = setInterval(()=>{ if(gameRunning) spawnResource(); }, 2800);
            spawnEnemyInt = setInterval(()=>{ if(gameRunning && enemies.length<5) spawnEnemy(); }, 13000);
            enemyAttackInt = setInterval(()=>{ if(gameRunning) enemiesAttack(); }, 1600);
        }
        
        function initGame(){
            player = { x:550,y:500,radius:18,health:100,maxHealth:100,hunger:80,thirst:80,armor:0,baseDamage:12,weaponBonus:0 };
            resources = { wood:22, stone:12, meat:5, cloth:6, water:8, metal:2 };
            worldResources = [];
            enemies = [];
            buildings = [];
            buildModeActive = false;
            selectedBuildType = "WALL";
            gameRunning=true; gameOver=false;
            targetX=player.x; targetY=player.y;
            for(let i=0;i<12;i++) spawnResource();
            for(let i=0;i<2;i++) spawnEnemy();
            updateUI();
            setMessage("🏠 Режим стройки: нажми кнопку и строй дом! Собирай ресурсы, защищай базу!");
            startLoops();
        }
        
        // события кнопок
        function bindUI(){
            canvas.addEventListener('click', handleCanvasClick);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('touchmove', (e)=>{ e.preventDefault(); handleMouseMove(e); });
            canvas.addEventListener('touchstart', (e)=>{ e.preventDefault(); handleCanvasClick(e); });
            document.getElementById('eatBtn').addEventListener('click', eatMeat);
            document.getElementById('drinkBtn').addEventListener('click', drinkWater);
            document.getElementById('craftAxeBtn').addEventListener('click', craftStoneAxe);
            document.getElementById('craftArmorBtn').addEventListener('click', craftHideArmor);
            document.getElementById('buildWallBtn').addEventListener('click', ()=>{ selectedBuildType="WALL"; setMessage("Выбрана СТЕНА. Включите режим стройки и кликните по земле."); });
            document.getElementById('buildFloorBtn').addEventListener('click', ()=>{ selectedBuildType="FLOOR"; setMessage("Выбран ФУНДАМЕНТ."); });
            document.getElementById('buildRoofBtn').addEventListener('click', ()=>{ selectedBuildType="ROOF"; setMessage("Выбрана КРЫША."); });
            const toggleBtn = document.getElementById('toggleBuildBtn');
            toggleBtn.addEventListener('click', ()=>{
                buildModeActive = !buildModeActive;
                toggleBtn.innerText = buildModeActive ? "🔨 Режим стройки: ВКЛ" : "🔨 Режим стройки: ВЫКЛ";
                toggleBtn.classList.toggle('build-mode', buildModeActive);
                setMessage(buildModeActive ? "Стройка активна! Кликни по полю чтобы построить выбранный блок." : "Режим стройки выключен.");
            });
        }
        
        function animate(){
            if(!gameRunning && gameOver){
                draw();
                requestAnimationFrame(animate);
                return;
            }
            updateMovement();
            draw();
            requestAnimationFrame(animate);
        }
        
        initGame();
        bindUI();
        animate();
    })();
</script>
</body>
</html>
